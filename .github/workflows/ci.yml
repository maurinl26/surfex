name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Fortran + NetCDF (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libnetcdff-dev

      - name: Toolchain Fortran + NetCDF (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc netcdf-fortran

      - name: Installer uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Build libsurfex.a (chaîne SURFEX + stub grib)
        run: ./build.sh --compiler gfortran

      - name: Build wheel (uv + meson-python)
        working-directory: python
        run: |
          uv build --wheel \
            --config-setting=setup-args=-Dsurfex_lib=${GITHUB_WORKSPACE}/exe/libsurfex.a

      - name: Smoke test (import + cycle de vie)
        run: |
          uv venv "$RUNNER_TEMP/venv"
          uv pip install --python "$RUNNER_TEMP/venv" python/dist/*.whl
          # Importer hors de python/ pour éviter le shadowing par le dossier source
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv/bin/python" -c "import karpos_surfex as ks; ks.init(); ks.finalize(); print('OK', ks.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: python/dist/*.whl
